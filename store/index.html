<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Rappi - Tienda</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=TASA+Explorer:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <div>
        <h1 class="logo">🏪 Mini Rappi</h1>
        <p class="subtitle">Gestión de Tienda</p>
      </div>
      <button id="logoutBtn" class="btn secondary">Cerrar Sesión</button>
    </header>

    <!-- LOGIN -->
    <section id="loginSection" class="section active">
      <div class="card">
        <h2>Acceso Tienda</h2>
        <p>Administra tus productos y pedidos</p>

        <div class="tabs">
          <button class="tab active" data-tab="login">Login</button>
          <button class="tab" data-tab="register">Registro</button>
        </div>

        <!-- LOGIN -->
        <form id="loginForm" class="form active">
          <label>Email</label>
          <input type="email" id="loginEmail" required />

          <label>Password</label>
          <input type="password" id="loginPassword" required />

          <button type="submit" class="btn primary">Entrar</button>
        </form>

        <!-- REGISTER -->
        <form id="registerForm" class="form">
          <label>Email</label>
          <input type="email" id="registerEmail" required />

          <label>Password</label>
          <input type="password" id="registerPassword" required />

          <!-- 🔥 importante -->
          <input type="hidden" id="registerRole" value="admin" />

          <button type="submit" class="btn primary">Registrarse</button>
        </form>
      </div>
    </section>

    <!-- MAIN -->
    <section id="mainSection" class="section hidden">

      <div class="user-info">
        <h3>Hola, <span id="storeName">Tienda</span></h3>
      </div>

      <section class="content">

        <!-- TABS -->
        <nav class="tabs">
          <button id="productsTab" class="tab active">Productos</button>
          <button id="ordersTab" class="tab">Pedidos</button>
        </nav>

        <!-- PRODUCTS -->
        <div id="productsGrid" class="grid"></div>

        <!-- ORDERS -->
        <div id="ordersGrid" class="grid hidden"></div>

        <!-- FEEDBACK -->
        <div id="loading" class="overlay hidden">
          <div class="spinner"></div>
          <p>Cargando...</p>
        </div>

        <div id="noData" class="overlay hidden">
          <p>No hay datos disponibles</p>
        </div>

      </section>
    </section>

  </div>

<script type="module" src="index.js"></script>

</body>
</html>
