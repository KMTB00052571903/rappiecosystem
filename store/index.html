<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Rappi - Tienda</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    .badge { padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; }
    .badge-created { background:#e3f2fd; color:#1565c0; }
    .badge-delivery { background:#fff3e0; color:#e65100; }
    .badge-done { background:#e8f5e9; color:#2e7d32; }
    .store-info-bar { display:flex; gap:14px; align-items:center; flex-wrap:wrap; padding:12px; background:#f0f7ff; border-radius:8px; margin-bottom:14px; }
    .toggle-label { display:flex; align-items:center; gap:6px; cursor:pointer; font-size:14px; }
    .order-header { display:flex; justify-content:space-between; align-items:center; }
    .order-card { margin-bottom:12px; }
    .error { color:#c62828; }
  </style>
</head>
<body>
  <div class="container">

    <header class="header">
      <div>
        <h1 class="logo">🏪 Mini Rappi</h1>
        <p class="subtitle">Gestión de Tienda</p>
      </div>
      <button id="logoutBtn" class="btn secondary hidden">Cerrar Sesión</button>
    </header>

    <!-- LOGIN / REGISTER -->
    <section id="loginSection" class="section active">
      <div class="card">
        <h2>Acceso Tienda</h2>
        <p>Administra tus productos y pedidos</p>

        <div class="tabs">
          <button class="tab active" data-tab="login">Login</button>
          <button class="tab" data-tab="register">Registro</button>
        </div>

        <form id="loginForm" class="form active">
          <label>Email</label>
          <input type="email" id="loginEmail" required />
          <label>Password</label>
          <input type="password" id="loginPassword" required />
          <button type="submit" class="btn primary">Entrar</button>
        </form>

        <form id="registerForm" class="form">
          <label>Nombre de la Tienda</label>
          <input type="text" id="registerStoreName" required placeholder="Ej: Pizza Express" />
          <label>Email</label>
          <input type="email" id="registerEmail" required />
          <label>Password</label>
          <input type="password" id="registerPassword" required />
          <button type="submit" class="btn primary">Registrarse</button>
        </form>
      </div>
    </section>

    <!-- MAIN -->
    <section id="mainSection" class="section hidden">

      <div class="user-info">
        <h3>Hola, <span id="storeDisplayName">Tienda</span></h3>
      </div>

      <!-- Store info bar (toggle + create product button) -->
      <div id="storeInfo"></div>

      <section class="content">
        <nav class="tabs">
          <button id="productsTab" class="tab active">Productos</button>
          <button id="ordersTab" class="tab">Pedidos</button>
        </nav>

        <div id="productsGrid" class="grid"></div>
        <div id="ordersGrid" class="grid hidden"></div>

        <div id="loading" class="overlay hidden">
          <div class="spinner"></div>
          <p>Cargando...</p>
        </div>

        <div id="noData" class="overlay hidden">
          <p>No hay datos disponibles</p>
        </div>
      </section>
    </section>

  </div>

  <script type="module" src="index.js"></script>
</body>
</html>
